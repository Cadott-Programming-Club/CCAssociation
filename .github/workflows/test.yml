name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Node dependencies
        run: npm ci
      - name: Generate code
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go generate ./...
      - name: Run tests
        run: go test -race ./...
