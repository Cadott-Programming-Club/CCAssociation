name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Node dependencies
        run: npm ci
      - name: Generate code
        # Pin the templ CLI to the runtime version in go.mod so the
        # generated _templ.go files match the API we actually link against.
        run: |
          TEMPL_VERSION=$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}
          go generate ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
