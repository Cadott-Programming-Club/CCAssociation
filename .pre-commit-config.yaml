repos:
  - repo: local
    hooks:
      - id: go-generate
        name: go generate
        entry: go generate ./...
        language: system
        pass_filenames: false
        types_or: [go, file]
        files: \.(go|templ|sql)$

      - id: templ-fmt
        name: templ fmt
        entry: templ fmt .
        language: system
        pass_filenames: false
        types: [file]
        files: \.templ$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint
        args: ['--timeout', '5m']
